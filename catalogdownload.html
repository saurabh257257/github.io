<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan to Download Catalog — Arambhika Enablers</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="assets/fabicon.jpg" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(145deg, #0f1f45 0%, #1a3a6b 55%, #2d6abf 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 44px 52px;
      text-align: center;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }

    .logo {
      height: 70px;
      width: auto;
      object-fit: contain;
      margin-bottom: 18px;
    }

    .company-name {
      font-size: 22px;
      font-weight: 700;
      color: #1a3a6b;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .tagline {
      font-size: 12px;
      color: #666;
      margin-bottom: 28px;
    }

    .divider {
      border: none;
      height: 1px;
      background: #e8edf5;
      margin: 0 0 28px;
    }

    .scan-label {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #2d6abf;
      margin-bottom: 20px;
    }

    .qr-wrap {
      display: inline-block;
      padding: 14px;
      border: 2px solid #e0e8f8;
      border-radius: 14px;
      background: #f8faff;
      margin-bottom: 24px;
    }

    #qrcode canvas, #qrcode img {
      display: block;
      border-radius: 6px;
    }

    .welcome-text {
      font-size: 17px;
      font-weight: 700;
      color: #1a3a6b;
      margin-bottom: 6px;
    }

    .welcome-url {
      font-size: 13px;
      color: #2d6abf;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 16px;
      display: block;
    }

    .desc {
      font-size: 13px;
      color: #555;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    .btn-catalog {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1a3a6b;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 13px 28px;
      border-radius: 40px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 16px rgba(26,58,107,0.3);
    }
    .btn-catalog:hover {
      background: #2d6abf;
      transform: translateY(-2px);
    }

    .footer-note {
      margin-top: 28px;
      font-size: 11px;
      color: #999;
      line-height: 1.7;
    }
    .footer-note a {
      color: #2d6abf;
      text-decoration: none;
    }

    /* Mobile: if user scans and lands here, auto-redirect to catalog */
    @media (max-width: 600px) {
      .card { padding: 32px 24px; }
      .company-name { font-size: 18px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <img class="logo" src="assets/company_logo.jpg" alt="Arambhika Enablers" />
    <div class="company-name">Arambhika Enablers</div>
    <div class="tagline">EV Battery Component Manufacturer</div>
    <hr class="divider" />

    <div class="scan-label">📱 Scan to Download Catalog</div>

    <div class="qr-wrap" id="qrWrap"></div>

  </div>

  <script>
    const catalogUrl = 'https://www.arambhikaenablers.in/catalog.html?autoprint=1';

    var qr = qrcode(0, 'M');
    qr.addData(catalogUrl);
    qr.make();
    document.getElementById('qrWrap').innerHTML = qr.createSvgTag(7, 4, 'Catalog QR');
    var svg = document.querySelector('#qrWrap svg');
    if (svg) {
      svg.style.width  = '280px';
      svg.style.height = '280px';
      svg.style.borderRadius = '8px';
      svg.querySelectorAll('rect[fill="#000000"], rect[fill="black"]').forEach(function(r){
        r.setAttribute('fill','#1a3a6b');
      });
    }

    // If opened on mobile (scanned), go straight to catalog — print fires there
    if (/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)) {
      window.location.replace(catalogUrl);
    }
  </script>

</body>
</html>
