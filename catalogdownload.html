<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan to Download Catalog — Arambhika Enablers</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="assets/fabicon.jpg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(145deg, #0f1f45 0%, #1a3a6b 55%, #2d6abf 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 44px 52px;
      text-align: center;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }

    .logo {
      height: 70px;
      width: auto;
      object-fit: contain;
      margin-bottom: 18px;
    }

    .company-name {
      font-size: 22px;
      font-weight: 700;
      color: #1a3a6b;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .tagline {
      font-size: 12px;
      color: #666;
      margin-bottom: 28px;
    }

    .divider {
      border: none;
      height: 1px;
      background: #e8edf5;
      margin: 0 0 28px;
    }

    .scan-label {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #2d6abf;
      margin-bottom: 20px;
    }

    .qr-wrap {
      display: inline-block;
      padding: 14px;
      border: 2px solid #e0e8f8;
      border-radius: 14px;
      background: #f8faff;
    }

    .qr-wrap img {
      display: block;
      border-radius: 6px;
    }

    @media (max-width: 600px) {
      .card { padding: 32px 24px; }
      .company-name { font-size: 18px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <img class="logo" src="assets/company_logo.jpg" alt="Arambhika Enablers" />
    <div class="company-name">Arambhika Enablers</div>
    <div class="tagline">EV Battery Component Manufacturer</div>
    <hr class="divider" />

    <div class="scan-label">📱 Scan to Download Catalog</div>

    <div class="qr-wrap">
      <img
        src="assets/qr_catalog.png"
        width="280"
        height="280"
        alt="Catalog QR Code"
      />
    </div>
  </div>

  <script>
    // If opened on mobile (scanned), go straight to catalog — print fires there
    if (/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)) {
      window.location.replace('https://www.arambhikaenablers.in/catalog.html?autoprint=1');
    }
  </script>

</body>
</html>
