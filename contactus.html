<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us — Arambhika Enablers</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="assets/fabicon.jpg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(145deg, #0a2e1a 0%, #1a5c2e 55%, #25a244 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 22px;
      padding: 40px 44px 36px;
      text-align: center;
      max-width: 540px;
      width: 100%;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }

    .logo {
      height: 64px;
      width: auto;
      object-fit: contain;
      margin-bottom: 14px;
    }

    .company-name {
      font-size: 20px;
      font-weight: 700;
      color: #1a3a6b;
      margin-bottom: 3px;
    }

    .tagline {
      font-size: 11.5px;
      color: #777;
      margin-bottom: 22px;
    }

    .divider {
      border: none;
      height: 1px;
      background: #e2eaf5;
      margin: 0 0 22px;
    }

    .scan-label {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #1a7a3c;
      margin-bottom: 16px;
    }

    /* ── BIG QR ── */
    .qr-wrap {
      display: inline-block;
      padding: 16px;
      border: 2.5px solid #b2dfbe;
      border-radius: 18px;
      background: #f2fbf5;
      margin-bottom: 24px;
    }

    #qrcode canvas, #qrcode img {
      display: block;
      border-radius: 8px;
    }

    /* ── INFO CARDS ── */
    .info-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 26px;
      text-align: left;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #f7f9fc;
      border: 1.5px solid #e0e8f5;
      border-radius: 12px;
      padding: 13px 16px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s, border-color 0.15s;
    }
    .info-row:hover {
      background: #eef2fb;
      border-color: #b8cef0;
    }

    .info-icon {
      font-size: 22px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .info-icon.green  { background: #e4f8eb; }
    .info-icon.blue   { background: #e6eefb; }
    .info-icon.orange { background: #fff4e0; }

    .info-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
      margin-bottom: 3px;
    }
    .info-value {
      font-size: 14px;
      font-weight: 700;
      color: #1a3a6b;
    }

    /* ── MAIN CTA BUTTON ── */
    .btn-wa {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      font-size: 15px;
      font-weight: 700;
      padding: 15px 24px;
      border-radius: 40px;
      text-decoration: none;
      background: #25d366;
      color: #fff;
      box-shadow: 0 6px 20px rgba(37,211,102,0.38);
      transition: opacity 0.2s, transform 0.15s;
      margin-bottom: 10px;
    }
    .btn-wa:hover { opacity: 0.9; transform: translateY(-2px); }

    .footer-note {
      margin-top: 20px;
      font-size: 11px;
      color: #bbb;
      line-height: 1.8;
    }
    .footer-note a { color: #2d6abf; text-decoration: none; }

    @media (max-width: 480px) {
      .card { padding: 28px 16px 28px; }
    }
  </style>
</head>
<body>

  <div class="card">

    <img class="logo" src="assets/company_logo.jpg" alt="Arambhika Enablers" />
    <div class="company-name">Arambhika Enablers</div>
    <div class="tagline">EV Battery Component Manufacturer</div>
    <hr class="divider" />

    <div class="scan-label">💬 Scan to Chat on WhatsApp</div>

    <div class="qr-wrap">
      <img id="qrImg" src="" alt="WhatsApp QR Code" width="280" height="280" style="display:block;border-radius:8px;" />
    </div>


  </div>

  <script>
    const waUrl = ‘https://wa.me/918112662827?text=’ +
      encodeURIComponent(‘Hi, I would like to know more about your products.’);

    // Use QR Server API — reliable, no JS library needed
    document.getElementById(‘qrImg’).src =
      ‘https://api.qrserver.com/v1/create-qr-code/?size=280x280&margin=10&color=0a5c1f&data=’ +
      encodeURIComponent(waUrl);
  </script>

</body>
</html>
